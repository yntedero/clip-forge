<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="cf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="100%" stop-color="#0891B2"></stop>
    </linearGradient>
    <filter id="cf-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"></feGaussianBlur>
      <feOffset dx="0" dy="2" result="off"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="cf-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"></feGaussianBlur>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="url(#cf-grad)"></rect>
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="rgba(255,255,255,0.06)"></rect>

  <g transform="translate(46,46) scale(6.875)" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#cf-shadow)">
    <circle cx="6" cy="6" r="3"></circle>
    <circle cx="6" cy="18" r="3"></circle>
    <path d="M8.12 8.12 12 12"></path>
    <path d="M20 4 8.12 15.88"></path>
    <path d="M14.8 14.8 20 20"></path>
  </g>
</svg>
